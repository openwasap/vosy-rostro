kind = "web"
previewPath = "/"
title = "Decart AI Camera"
version = "1.0.0"
id = "artifacts/decart-camera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23560

[services.development]
run = "pnpm --filter @workspace/decart-camera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/decart-camera", "run", "build" ]
publicDir = "artifacts/decart-camera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23560"
BASE_PATH = "/"
